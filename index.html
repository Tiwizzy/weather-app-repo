<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="search">
      <input type="text" placeholder="enter city name" spellcheck="false">
      <button><img src="Images/search.png" alt=""></button>
    </div>
    <div class="weather">
      <img src="Images/rain.png" class="weather-icon">
      <h1 class="temp">22°c</h1>
      <h2 class="city">New York</h2>
      <div class="details">
        <div class="col">
          <img src="Images/humidity.png">
          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>
        <div class="col">
          <img src="Images/wind.png">
          <div>
            <p class="wind">15km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>
    <div class="default-cities">
      <h3>Popular Cities</h3>
      <div class="city-cards" id="cityCards"></div>
    </div>
    <div class="error">
      <p>Invalid city name</p>
    </div>
    
  </div>

  <script>
    const apiKey = "e3542bce22c9b11f94008de2d31ecb52";
    const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q="; 

    const searchBox = document.querySelector(".search input");
    const searchBtn = document.querySelector(".search button");
    const weatherIcon = document.querySelector(".weather-icon");

    async function checkWeather(city){
      const response = await fetch(apiUrl + city + `&appid=${apiKey}`);

      if(response.status == 404){
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
      }else{
        var data = await response.json();
      

      document.querySelector(".city").innerHTML = data.name;
      document.querySelector(".temp").innerHTML = Math.round(data.main.temp)  + "°c";
      document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
      document.querySelector(".wind").innerHTML = data.wind.speed + "km/hr";

      if(data.weather[0].main == "Clouds" ){
        weatherIcon.src = "images/clouds.png";
      }
      else if(data.weather[0].main == "Clear"){
        weatherIcon.src = "images/clear.png";
      }
      else if(data.weather[0].main == "Rain"){
        weatherIcon.src = "images/rain.png";
      }
      else if(data.weather[0].main == "Drizzle"){
        weatherIcon.src = "images/drizzle.png";
      }
      else if(data.weather[0].main == "Mist"){
        weatherIcon.src = "images/mist.png";
      }

      document.querySelector(".weather").style.display = "block";
      document.querySelector(".error").style.display = "none";
      }
      
    }
    searchBox.addEventListener("keypress", (event)=> {
      if(event.key === "Enter"){
       checkWeather(searchBox.value);
      }
    });    
    searchBtn.addEventListener("click", ()=>{
       checkWeather(searchBox.value);
    });
    // Default cities to display on load
const defaultCities = ["Lagos", "London", "New York", "Dubai", "Tokyo"];

async function loadDefaultCities() {
  const container = document.getElementById("cityCards");
  container.innerHTML = "";

  for(const city of defaultCities){
    try {
      const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
      const data = await response.json();

      const card = document.createElement("div");
      card.classList.add("city-card");
      card.innerHTML = `
        <div class="card-left">
          <h4>${data.name}</h4>
          <p>${data.weather[0].description}</p>
        </div>
        <div class="card-right">
          ${Math.round(data.main.temp)}°c
        </div>
      `;

      // Clicking a city card searches that city
      card.addEventListener("click", () => {
        searchBox.value = data.name;
        checkWeather(data.name);
        window.scrollTo(0, 0);
      });

      container.appendChild(card);
    } catch(err) {
      console.log(`Could not load ${city}`);
    }
  }
}

// Load default cities when page opens
loadDefaultCities();
    

    
  </script>
</body>
</html>
